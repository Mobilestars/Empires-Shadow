 ES_MONEY_TOPBAR_TOOLTIP_LOC:0 "Staatskasse\nAktueller Bestand: [?ROOT.money|0] Dollar\nMonatliches Wachstum: +[?ROOT.monthly_income|0] Dollar\nMonatliche Ausgaben: -[?ROOT.monthly_wages|0] Dollar\nMonatliche Baukosten: -[?ROOT.es_expense_build_total|0] Dollar\nMonatliche Nettoaenderung: [?ROOT.monthly_net|+=0] Dollar\n\nEinnahmen:\n Steuern: +[?ROOT.es_income_taxes|0]\n Zivilfabriken: +[?ROOT.es_income_civ_factories|0]\n\nAusgaben:\n Divisionsbesoldung: -[?ROOT.es_expense_divisions|0]\n Unterhalt Militaerfabriken: -[?ROOT.es_expense_military_factories|0]\n Unterhalt Werften: -[?ROOT.es_expense_dockyards|0]\n Bau Militaerfabriken: -[?ROOT.es_expense_build_military_factories|0]\n Bau Werften: -[?ROOT.es_expense_build_dockyards|0]\n\nSteuerpflichtige Zivilbevoelkerung = eigene Kern- und Nicht-Kernbevoelkerung minus Soldaten im Feld minus Soldaten in Ausbildung.\nFalls die Staaten-Bevoelkerung im Skript nicht direkt gelesen werden kann, faellt das System auf aktuelle Manpower plus bereits eingezogene Truppen zurueck.\nBaukosten werden bei Fertigstellung eines Gebaeudes (monatlicher Check) abgerechnet."
