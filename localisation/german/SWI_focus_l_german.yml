 l_german:
 # WIRTSCHAFT
 SWI_bankenplatz:0 "Bankenplatz Schweiz"
 SWI_bankenplatz_desc:0 "Die Schweiz hat sich als eines der bedeutendsten Finanzzentren Europas etabliert. Unsere neutralen Banken genießen das Vertrauen aller Nationen – Freund wie Feind. Nutzen wir diese einzigartige Stellung, um unsere Wirtschaft weiter zu stärken."
 SWI_nationalbank:0 "Schweizerische Nationalbank"
 SWI_nationalbank_desc:0 "Die Schweizerische Nationalbank hütet unsere Währungsreserven und stabilisiert unseren Franken. Mit einer stärkeren Zentralbank können wir die Wirtschaft des Landes besser steuern und das Vertrauen unserer Handelspartner sichern."
 SWI_uhrenindustrie:0 "Uhrenindustrie"
 SWI_uhrenindustrie_desc:0 "Die schweizerische Uhrenindustrie ist weltberühmt für ihre Präzision und Qualität. Von Genf bis ins Jura – unsere Zeitmesser sind in jeder Welthauptstadt begehrt. Wir werden diese Industrie ausbauen und modernisieren."
 SWI_devisenreserven:0 "Devisenreserven"
 SWI_devisenreserven_desc:0 "Als neutrales Land mit stabiler Währung strömen die Devisen Europas in unsere Banken. Diese Reserven geben uns wirtschaftliche Unabhängigkeit und Einfluss, auch ohne direkte politische Macht."
 SWI_praezisionstechnik:0 "Präzisionstechnik"
 SWI_praezisionstechnik_desc:0 "Die Tradition der Uhrmacherei hat in der Schweiz Generationen von Ingenieuren und Technikern hervorgebracht. Mit Investitionen in Forschung und Entwicklung können wir diese Expertise auf neue Industriezweige ausdehnen."
 SWI_exportwirtschaft:0 "Exportwirtschaft"
 SWI_exportwirtschaft_desc:0 "Die Schweiz hat keine natürlichen Großmachtsressourcen – doch was wir exportieren, steht für Qualität und Zuverlässigkeit. Maschinen, Uhren, Chemikalien und Präzisionsinstrumente: die Welt braucht, was wir produzieren."

 # NEUTRALITÄT / AUSSENPOLITIK
 SWI_ewige_neutralitaet:0 "Ewige Neutralität"
 SWI_ewige_neutralitaet_desc:0 "Seit dem Wiener Kongress von 1815 ist die Neutralität der Schweiz international anerkannt. In einer Welt voller Großmächte und Bündnisse ist unsere Neutralität kein Zeichen der Schwäche, sondern eine strategische Stärke, die es um jeden Preis zu bewahren gilt."
 SWI_rotes_kreuz:0 "Das Rote Kreuz"
 SWI_rotes_kreuz_desc:0 "Es war ein Schweizer, Henri Dunant, der nach der Katastrophe von Solferino das Internationale Komitee vom Roten Kreuz gründete. Diese Genfer Institution ist heute das moralische Gewissen der Welt. Wir werden sie stärken und zu einem Symbol des Friedens machen."
 SWI_vlkerbund:0 "Sitz des Völkerbundes"
 SWI_vlkerbund_desc:0 "Der Völkerbund hat seinen Sitz in Genf – ein Beweis für das Vertrauen der Welt in die Schweiz als neutralen Gastgeber. Wir werden diese Rolle ausbauen und Genf zum Zentrum internationaler Diplomatie machen."
 SWI_humanitaere_hilfe:0 "Humanitäre Hilfe"
 SWI_humanitaere_hilfe_desc:0 "Als neutrale Nation können wir dort helfen, wo Großmächte scheitern. Unsere Ärzte, Diplomaten und Hilfsorganisationen arbeiten weltweit – und stärken damit unsere Reputation als ehrlicher Makler."
 SWI_genf_als_zentrum:0 "Genf als diplomatisches Zentrum"
 SWI_genf_als_zentrum_desc:0 "Genf beherbergt bereits den Völkerbund und das Rote Kreuz. Wir werden weitere internationale Organisationen und Botschaften einladen, unsere Stadt zur Welthauptstadt der Diplomatie zu machen."
 SWI_internationalismus:0 "Schweizer Internationalismus"
 SWI_internationalismus_desc:0 "Die Schweiz steht für internationale Zusammenarbeit, humanitäres Recht und friedliche Konfliktlösung. Diese Werte sind nicht nur moralisch richtig – sie schützen auch unsere Unabhängigkeit gegenüber den Großmächten."

 # INNENPOLITIK
 SWI_bundesrat:0 "Bundesrat"
 SWI_bundesrat_desc:0 "Der Schweizer Bundesrat regiert im Kollegialprinzip – kein Kanzler, kein Kaiser, nur sieben gleichberechtigte Bundesräte. Dieses System bringt Stabilität und Kompromissfindung, doch in der heutigen Zeit müssen wir unsere Strukturen stärken."
 SWI_direktdemokratie:0 "Direkte Demokratie"
 SWI_direktdemokratie_desc:0 "Die Schweiz ist stolz auf ihre direkte Demokratie – ein System, das den Bürgern nicht nur das Recht zu wählen gibt, sondern auch das Recht, über Gesetze und Verfassungsänderungen selbst abzustimmen. Diese Tradition ist fundamental für unsere Identität."
 SWI_kantonale_autonomie:0 "Kantonale Autonomie"
 SWI_kantonale_autonomie_desc:0 "Die Schweiz ist kein zentralisierter Staat, sondern ein Bund von 26 souveränen Kantonen. Jeder Kanton mit seiner eigenen Geschichte, Sprache und Tradition. Diese Vielfalt ist unsere Stärke – wir werden die kantonale Eigenverantwortung stärken."
 SWI_volksrechte:0 "Volksrechte stärken"
 SWI_volksrechte_desc:0 "Referendum und Initiative sind die mächtigsten Waffen des Schweizer Bürgers. Wir werden die Volksrechte ausbauen und das Vertrauen der Bevölkerung in unsere Institutionen festigen."
 SWI_partei_staerken:0 "Politische Ausrichtung"
 SWI_partei_staerken_desc:0 "Die Welt um uns herum verändert sich rasant. Neue politische Strömungen gewinnen an Boden. Die Schweiz muss entscheiden, in welche Richtung sie gehen will – demokratisch, autoritär oder revolutionär."

 # Partei-Pfade
 SWI_demokratie_staerken:0 "Demokratie stärken"
 SWI_demokratie_staerken_desc:0 "Die Freisinnigen, Konservativen und Sozialdemokraten – trotz aller Differenzen eint sie die Überzeugung, dass Demokratie das beste System für unser Land ist. Wir werden die demokratischen Kräfte der Schweiz vereinen."
 SWI_faschismus_staerken:0 "Frontenbewegung fördern"
 SWI_faschismus_staerken_desc:0 "Die Nationalen Fronten und ähnliche Bewegungen gewinnen auch in der Schweiz an Anhänger. Sie rufen nach nationaler Erneuerung, Stärke und der Abkehr von parliamentary Kompromissen. Ob dies der richtige Weg ist, muss sich noch zeigen."
 SWI_kommunismus_staerken:0 "Arbeiterbewegung stärken"
 SWI_kommunismus_staerken_desc:0 "Der Landesstreik von 1918 hat gezeigt, dass sich die Schweizer Arbeiterschaft organisieren kann. Die kommunistischen Ideen aus dem Osten finden auch hier Anhänger. Die Zeit könnte für eine Revolution reif sein."

 # Demokratischer Pfad
 SWI_freie_presse:0 "Freie Presse"
 SWI_freie_presse_desc:0 "In einer Demokratie ist eine freie Presse unerlässlich. Die Zeitungen der Schweiz informieren die Bürger und halten Macht in Schach. Wir werden die Pressefreiheit schützen und fördern."
 SWI_sozialreformen:0 "Sozialreformen"
 SWI_sozialreformen_desc:0 "Der Sozialstaat ist die beste Antwort auf den Kommunismus und den Faschismus. Wir werden in Bildung, Gesundheit und Sozialversicherung investieren, damit kein Schweizer Bürger vergessen wird."
 SWI_bundesstaat_konsolidieren:0 "Bundesstaat konsolidieren"
 SWI_bundesstaat_konsolidieren_desc:0 "Ein starker demokratischer Bundesstaat ist das Fundament unserer Sicherheit. Wir werden die Institutionen der Eidgenossenschaft festigen und für die kommenden Herausforderungen stärken."

 # Faschistischer Pfad
 SWI_nationale_erneuerung:0 "Nationale Erneuerung"
 SWI_nationale_erneuerung_desc:0 "Die Frontisten und Nationalsozialisten predigen nationale Erneuerung und die Rückkehr zu alten Tugenden. Die Schweiz, einst das Land der Eidgenossen und tapferen Kämpfer, soll wieder zu ihrer Stärke finden."
 SWI_frontenfruhling:0 "Frontenfrühling"
 SWI_frontenfruhling_desc:0 "Die nationalen Fronten haben die Macht übernommen. Ein neues Schweizer Erwachen beginnt. Der Parlamentarismus weicht einem starken, einheitlichen Willen der Nation."
 SWI_anschluss_an_deutschland:0 "Anschluss an das Reich"
 SWI_anschluss_an_deutschland_desc:0 "Ist die Schweiz nicht im Kern ein deutsches Land? Die deutschsprachige Mehrheit blickt mit Bewunderung auf das mächtige Kaiserreich. Vielleicht ist es an der Zeit, die Trennung zu überwinden und dem Deutschen Reich beizutreten."

 # Kommunistischer Pfad
 SWI_arbeiterbewegung:0 "Arbeiterbewegung"
 SWI_arbeiterbewegung_desc:0 "Die Arbeiter der Schweiz erheben ihre Stimme. Gewerkschaften und kommunistische Parteiorganisationen mobilisieren die Fabrikarbeiter, die Bergbauern und die städtischen Armen."
 SWI_rote_schweiz:0 "Rote Schweiz"
 SWI_rote_schweiz_desc:0 "Die Schweizer Räterepublik ist ausgerufen! Die direktdemokratische Tradition der Schweiz bekommt eine neue revolutionäre Bedeutung. Gemeinsam aufgebaut, den Kapitalisten entrissen."

 # MILITÄR
 SWI_bewaffnete_neutralitaet:0 "Bewaffnete Neutralität"
 SWI_bewaffnete_neutralitaet_desc:0 "Der Schweizer Grundsatz: Wir greifen niemanden an, aber wir wehren uns mit aller Kraft. Unsere Milizarmee ist kein Angriffswerkzeug, sondern ein Schild. Wir werden unsere Verteidigung zur stärksten in den Alpen machen."
 SWI_milizreform:0 "Milizreform"
 SWI_milizreform_desc:0 "Die Schweizer Milizarmee basiert auf dem Prinzip, dass jeder Bürger ein Soldat ist. Wir werden die Ausbildung verbessern, die Ausrüstung modernisieren und die Reserven ausbauen – bereit, jeden Angriff abzuwehren."
 SWI_alpenbefestigungen:0 "Alpenbefestigungen"
 SWI_alpenbefestigungen_desc:0 "Die Alpen sind die natürlichste Festung der Welt. Doch Natur allein reicht nicht aus. Wir werden Bunker, Sperranlagen und Geschützstellungen bauen, die jeden Eindringling aufhalten."
 SWI_alpenjager:0 "Alpenjäger"
 SWI_alpenjager_desc:0 "Ein Schweizer Alpenjäger kennt die Bergwelt wie seine Westentasche. Unsere Gebirgstruppen werden zu einigen der effektivsten Soldaten in Europa ausgebildet – in Gelände, das kein Angreifer kennt so gut wie wir."
 SWI_reduit:0 "Nationales Réduit"
 SWI_reduit_desc:0 "Das Nationale Réduit ist unser letzter Rückhalt: ein System von tief in die Alpen gehauenen Festungen, Tunneln und Waffenlagern. Kein Feind, der die Schweizer Vorstädte einnimmt, kann auch das Réduit nehmen."
 SWI_festung_schweiz:0 "Festung Schweiz"
 SWI_festung_schweiz_desc:0 "Die Schweiz ist zur uneinnehmbarsten Festung Europas geworden. Alpenjäger, Réduit und Befestigungen bilden ein unüberwindliches Triumvirat. Wer die Schweiz angreift, greift Stein an."

 # IDEEN
 SWI_nationalbank_idea:0 "Schweizerische Nationalbank"
 SWI_nationalbank_idea_desc:0 "Der starke Schweizer Franken und die solide Geldpolitik der Nationalbank sichern wirtschaftliche Stabilität und fördern Investitionen."
 SWI_devisenreserven_idea:0 "Devisenreserven"
 SWI_devisenreserven_idea_desc:0 "Umfangreiche Devisenreserven ermöglichen günstige Handelskonditionen und sichern den Zugang zu Rohstoffen aus dem Ausland."
 SWI_exportwirtschaft_idea:0 "Exportorientierte Wirtschaft"
 SWI_exportwirtschaft_idea_desc:0 "Schweizer Qualitätsprodukte sind weltweit gefragt und bringen wertvolle Devisen ins Land."
 SWI_neutralitaet_idea:0 "Bewaffnete Neutralität"
 SWI_neutralitaet_idea_desc:0 "Die Schweiz erklärt keinerlei Kriegsziele und wird keiner Allianz beitreten. Diese Neutralität kostet jedoch den Preis, dass Diplomatie und Kriegstreiberei schwerer fallen."
 SWI_rotes_kreuz_idea:0 "Heimat des Roten Kreuzes"
 SWI_rotes_kreuz_idea_desc:0 "Als Gastland des IKRK genießt die Schweiz moralische Autorität und internationale Anerkennung, was die innere Stabilität fördert."
 SWI_humanitaere_hilfe_idea:0 "Humanitäre Tradition"
 SWI_humanitaere_hilfe_idea_desc:0 "Die Schweiz ist als ehrlicher Makler und Helfer bekannt. Dies erleichtert diplomatische Beziehungen weltweit."
 SWI_genf_zentrum_idea:0 "Diplomatisches Zentrum Genf"
 SWI_genf_zentrum_idea_desc:0 "Genf ist das Herzstück internationaler Diplomatie. Dieser Status bringt politischen Einfluss und diplomatische Möglichkeiten weit über unsere Grenzen hinaus."
 SWI_internationalismus_idea:0 "Schweizer Internationalismus"
 SWI_internationalismus_idea_desc:0 "Unser Engagement für internationale Organisationen stärkt Stabilität und Handelsnetzwerke."
 SWI_direktdemokratie_idea:0 "Direkte Demokratie"
 SWI_direktdemokratie_idea_desc:0 "Das Referendum und die Volksinitiative verankern die politische Macht beim Volk und sorgen für hohe Stabilität."
 SWI_kantone_idea:0 "Kantonale Eigenverantwortung"
 SWI_kantone_idea_desc:0 "Die Autonomie der Kantone stärkt die lokale Verwaltung und vertieft die Loyalität der Bürger gegenüber dem Bundesstaat."
 SWI_volksrechte_idea:0 "Gestärkte Volksrechte"
 SWI_volksrechte_idea_desc:0 "Ein empowertes Volk trägt stärker zur Landesverteidigung und wirtschaftlichen Entwicklung bei."
 SWI_freie_presse_idea:0 "Freie Presse"
 SWI_freie_presse_idea_desc:0 "Eine freie und lebendige Presselandschaft stärkt das demokratische Bewusstsein der Bürger."
 SWI_sozialreformen_idea:0 "Sozialreformen"
 SWI_sozialreformen_idea_desc:0 "Investitionen in Bildung und Sozialversicherung verbessern die Lebensqualität und stärken die gesellschaftliche Geschlossenheit."
 SWI_nationale_erneuerung_idea:0 "Nationale Erneuerung"
 SWI_nationale_erneuerung_idea_desc:0 "Nationalistische Rhetorik und Mobilisierung steigern die Kriegsbereitschaft der Bevölkerung."
 SWI_frontenfruhling_idea:0 "Frontenfrühling"
 SWI_frontenfruhling_idea_desc:0 "Die Nationalen Fronten halten die Schweiz in einem Zustand nationalrevolutionärer Energie."
 SWI_arbeiterbewegung_idea:0 "Organisierte Arbeiterbewegung"
 SWI_arbeiterbewegung_idea_desc:0 "Eine gut organisierte Arbeiterschaft steigert die Produktivität und politische Schlagkraft der Linken."
 SWI_rote_schweiz_idea:0 "Rote Schweiz"
 SWI_rote_schweiz_idea_desc:0 "Die revolutionäre Begeisterung treibt Produktion und Verteidigung voran."
 SWI_bewaffnete_neutralitaet_idea:0 "Bewaffnete Neutralität"
 SWI_bewaffnete_neutralitaet_idea_desc:0 "Jeder Schweizer weiß: Wir verteidigen unsere Heimat, koste es was es wolle."
 SWI_milizreform_idea:0 "Milizreform"
 SWI_milizreform_idea_desc:0 "Eine reformierte Milizarmee bedeutet kürzere Ausbildungszeiten und mehr einsatzbereite Truppen."
 SWI_alpenjager_idea:0 "Alpenjäger-Korps"
 SWI_alpenjager_idea_desc:0 "Schweizer Gebirgstruppen sind im Gebirge unübertroffen – ihre lokale Kenntnis macht sie zu gefürchteten Verteidigern."
 SWI_reduit_idea:0 "Nationales Réduit"
 SWI_reduit_idea_desc:0 "Das Réduit-Konzept macht jeden Meter Schweizer Boden zur Verteidigungsposition."
 SWI_festung_schweiz_idea:0 "Festung Schweiz"
 SWI_festung_schweiz_idea_desc:0 "Die Schweiz ist zu einem uneinnehmlichen Bollwerk geworden. Verteidigung ist unsere Stärke."
