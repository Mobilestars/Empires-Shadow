 l_german:
 # WIRTSCHAFT
 GER_wirtschaftswunder:0 "Wirtschaftswunder"
 GER_wirtschaftswunder_desc:0 "Seit unserem Sieg im Großen Krieg floriert die deutsche Wirtschaft. Nutzen wir diesen Schwung, um noch größeren Wohlstand für das Vaterland zu schaffen."
 GER_kaiserliche_industrie:0 "Kaiserliche Industrie"
 GER_kaiserliche_industrie_desc:0 "Die Fabriken des Kaisers sind das Rückgrat unseres Kaiserreichs. Wir werden sie ausbauen, um unsere industrielle Überlegenheit zu sichern."
 GER_stahl_und_kohle:0 "Stahl und Kohle"
 GER_stahl_und_kohle_desc:0 "Die reichen Stahl- und Kohlevorkommen des Rheinlandes treiben das Kaiserreich an. Wir werden massiv in die Förderung dieser lebenswichtigen Ressourcen investieren."
 GER_grosse_infrastruktur:0 "Große Infrastruktur"
 GER_grosse_infrastruktur_desc:0 "Ein mächtiges Kaiserreich braucht mächtige Straßen und Eisenbahnen. Wir werden ein Infrastrukturnetz errichten, das seinesgleichen in ganz Europa sucht."
 GER_reichsbahn_ausbau:0 "Ausbau der Reichsbahn"
 GER_reichsbahn_ausbau_desc:0 "Die Reichsbahn ist die Lebensader unserer Wirtschaft und unseres Militärs. Ihr Ausbau erhöht die Geschwindigkeit von Handel und Truppenbewegungen gleichermaßen."
 GER_wirtschaftspolitik:0 "Wirtschaftspolitik"
 GER_wirtschaftspolitik_desc:0 "Die Minister des Reiches streiten seit langem über den besten Kurs für unsere wirtschaftliche Zukunft. Die Zeit ist gekommen, eine klare Politik für die kommenden Jahrzehnte festzulegen."
 GER_synthol_forschung:0 "Synthetöl-Forschung"
 GER_synthol_forschung_desc:0 "Deutschland verfügt kaum über natürliches Öl. Unsere Wissenschaftler müssen effiziente Methoden zur Herstellung von synthetischen Kraftstoffen entwickeln."
 GER_ru_stungsexporte:0 "Rüstungsexporte"
 GER_ru_stungsexporte_desc:0 "Deutsche Ingenieurskunst ist weltbekannt. Durch den Export unserer überlegenen Waffen an befreundete und neutrale Nationen können wir wertvolle Devisen erwirtschaften."

 # INNENPOLITIK - ALLGEMEIN (alle Regierungen)
 GER_innenpolitik:0 "Innenpolitik"
 GER_innenpolitik_desc:0 "Die innere Ordnung des Reiches muss gesichert werden. Ob wir als Kaiser, Demokraten, Sozialisten oder Nationalisten regieren — die politische Ausrichtung Deutschlands muss festgelegt werden."
 GER_partei_verstaerkung:0 "Partei stärken"
 GER_partei_verstaerkung_desc:0 "Politische Macht entsteht nicht von selbst. Wir müssen entscheiden, welche politische Kraft wir fördern wollen, und unsere Ressourcen entsprechend einsetzen."

 # PARTEI-STÄRKUNG (gegenseitig exklusiv, für alle sichtbar)
 GER_kaiserreich_staerken:0 "Das Kaiserreich stärken"
 GER_kaiserreich_staerken_desc:0 "Wir werden die Unterstützung für die kaiserliche Sache stärken — die Junker, den Militärapparat und die konservativen Massen hinter dem Banner des Kaisers versammeln."
 GER_demokraten_staerken:0 "Die Demokraten stärken"
 GER_demokraten_staerken_desc:0 "Die demokratische Bewegung gewinnt Unterstützung von Liberalen, gemäßigten Sozialisten und fortschrittlichen Wählern. Wir werden ihr die nötigen Mittel geben."
 GER_kommunisten_staerken:0 "Die Kommunisten stärken"
 GER_kommunisten_staerken_desc:0 "Die revolutionäre Linke gewinnt an Boden. Die Kommunistische Partei Deutschlands soll unsere Unterstützung erhalten, um die kapitalistische Ordnung herauszufordern."
 GER_faschisten_staerken:0 "Die Faschisten stärken"
 GER_faschisten_staerken_desc:0 "Eine neue radikalnationalistische Bewegung entsteht. Wir sollen den Zorn der Veteranen, Nationalisten und der Vergessenen in eine mächtige politische Kraft kanalisieren."

 # KAISERREICH-PFAD (nur sichtbar wenn Kaiserreich an der Macht)
 GER_kaiser_unterstuetzung:0 "Kaiserliche Unterstützung"
 GER_kaiser_unterstuetzung_desc:0 "Kaiser Wilhelm steht als Symbol der deutschen Macht. Wir werden seine Stellung stärken und das Volk um seinen Thron scharen."
 GER_reichsverfassung:0 "Reichsverfassung"
 GER_reichsverfassung_desc:0 "Die Reichsverfassung von 1871 hat uns gute Dienste geleistet. Wir werden die verfassungsmäßigen Strukturen bestätigen und festigen, die unser großes Reich zusammenhalten."
 GER_kaiserliche_verwaltung:0 "Kaiserliche Verwaltung"
 GER_kaiserliche_verwaltung_desc:0 "Eine gut geölte bürokratische Maschinerie ist unerlässlich für die Regierung unseres riesigen Reiches. Wir müssen die kaiserliche Verwaltung reformieren und stärken."
 GER_pangermanismus:0 "Pangermanismus"
 GER_pangermanismus_desc:0 "Die Idee einer großen deutschen Nation, die alle deutschsprachigen Völker unter dem Banner des Kaisers vereint, entfacht patriotische Begeisterung in ganz Europa."
 GER_propaganda_des_kaisers:0 "Kaiserliche Propaganda"
 GER_propaganda_des_kaisers_desc:0 "Beherrsche die Presse, forme die Gedanken. Der kaiserliche Propagandaapparat wird die Loyalität des Volkes zementieren."
 GER_monarchistische_jugend:0 "Monarchistische Jugend"
 GER_monarchistische_jugend_desc:0 "Wir werden in die Erziehung der deutschen Jugend investieren und ihr von früh auf Loyalität zu Kaiser und Vaterland einimpfen."
 GER_volkssturm_des_kaiserreichs:0 "Kaiserliche Heimwehr"
 GER_volkssturm_des_kaiserreichs_desc:0 "Jeder waffenfähige deutsche Mann schuldet dem Kaiser seinen Dienst. Wir werden Reserveeinheiten aufstellen."
 GER_kaiserreich_festigen:0 "Das Kaiserreich konsolidieren"
 GER_kaiserreich_festigen_desc:0 "Das Deutsche Kaiserreich soll dauerhaft und unerschütterlich gemacht werden. Seine Institutionen werden reformiert und gestärkt, um Generationen zu überdauern."
 GER_wilhelminisches_militaer:0 "Wilhelminische Militärtradition"
 GER_wilhelminisches_militaer_desc:0 "Die Traditionen des kaiserlichen deutschen Militärs, geschmiedet in den Einigungskriegen und gehärtet auf den Schlachtfeldern des Großen Krieges, sollen bewahrt werden."
 GER_bund_der_kaiser:0 "Bund der Kaiser"
 GER_bund_der_kaiser_desc:0 "Deutschland soll Bündnisse mit anderen großen Monarchien schmieden und einen 'Bund der Kaiser' als Gegenpol zur demokratischen und kommunistischen Welt schaffen."

 # DEMOKRATISCHER PFAD (nur sichtbar wenn Demokraten an der Macht)
 GER_verfassungskonvent:0 "Verfassungskonvent"
 GER_verfassungskonvent_desc:0 "Ein großer Verfassungskonvent soll einberufen werden, mit Vertretern aller gesellschaftlichen Schichten Deutschlands, um eine neue Verfassung zu entwerfen."
 GER_weimarer_weg:0 "Der Weimarer Weg"
 GER_weimarer_weg_desc:0 "Die Monarchie wird zugunsten einer demokratischen Republik beiseitegeschoben. Deutschland tritt in ein neues Zeitalter ein."
 GER_parlamentarismus:0 "Parlamentarismus"
 GER_parlamentarismus_desc:0 "Wahre Demokratie erfordert ein Parlament mit echter Gesetzgebungskraft. Wir werden die Rechte der gewählten Vertreter verankern und ein stabiles Mehrparteiensystem aufbauen."

 # KOMMUNISTISCHER PFAD (nur sichtbar wenn Kommunisten an der Macht)
 GER_rote_front:0 "Rote Front"
 GER_rote_front_desc:0 "Die Kommunistische Partei Deutschlands erhebt sich, organisiert und militant. Die Rote Front ist bereit, die bürgerliche Ordnung herauszufordern."
 GER_raetemacht:0 "Rätemacht"
 GER_raetemacht_desc:0 "Alle Macht den Räten! Deutschland soll eine Räterepublik werden, regiert vom Volk und für das Volk."
 GER_sowjet_buendnis:0 "Bündnis mit den Sowjets"
 GER_sowjet_buendnis_desc:0 "Die proletarischen Revolutionen Deutschlands und Russlands sollen zusammenfinden. Ein deutsch-sowjetisches Bündnis wird die Grundfesten der kapitalistischen Welt erschüttern."

 # FASCHISTISCHER PFAD (nur sichtbar wenn Faschisten an der Macht)
 GER_nationale_bewegung:0 "Nationale Bewegung"
 GER_nationale_bewegung_desc:0 "Eine radikalnationalistische Bewegung hat die Macht übernommen. Die alte Ordnung bricht zusammen. Deutschland muss sich jetzt um den eisernen Willen der Nation neu gestalten."
 GER_sa_milizen:0 "SA-Milizen"
 GER_sa_milizen_desc:0 "Die Sturmabteilung — der paramilitärische Arm der Bewegung — soll ausgebaut und bewaffnet werden. Diese Kämpfer werden den Willen der Bewegung auf den Straßen durchsetzen."
 GER_propaganda_feldzug:0 "Propagandafeldzug"
 GER_propaganda_feldzug_desc:0 "Presse, Rundfunk und öffentliche Veranstaltungen sollen genutzt werden, um die Ideologie der Bewegung zu verbreiten und abweichende Stimmen zum Schweigen zu bringen."
 GER_gleichschaltung:0 "Gleichschaltung"
 GER_gleichschaltung_desc:0 "Jede Institution — Gerichte, Gewerkschaften, Presse, Universitäten — soll auf die Ideologie der Bewegung ausgerichtet werden. Deutschland spricht mit einer Stimme."
 GER_fuehrerstaat:0 "Führerstaat"
 GER_fuehrerstaat_desc:0 "Das Zeitalter der Parlamente ist vorbei. Deutschland soll von der absoluten Autorität eines einzigen Führers regiert werden — stark, entschlossen und rücksichtslos."
 GER_vierjahresplan:0 "Vierjahresplan"
 GER_vierjahresplan_desc:0 "Die Wirtschaft wird vollständig für die Ziele des Staates mobilisiert. Aufrüstung, Autarkie und industrielle Expansion haben absolute Priorität."
 GER_achsenmaechte:0 "Achsenmächte"
 GER_achsenmaechte_desc:0 "Das faschistische Deutschland soll Kontakt zu gleichgesinnten Regimes in Europa aufnehmen. Gemeinsam schmieden wir eine Machtsachse, die die Landkarte der Welt neu zeichnen wird."

 # MILITÄR
 GER_kaiserliches_heer:0 "Kaiserliches Heer"
 GER_kaiserliches_heer_desc:0 "Das Kaiserliche Deutsche Heer ging siegreich aus dem Großen Krieg hervor. Nun müssen wir es modernisieren und stärken."
 GER_sturmbataillon:0 "Sturmbataillone"
 GER_sturmbataillon_desc:0 "Die Stoßtruppen haben im Großen Krieg revolutionäre Angriffstaktiken erprobt. Wir werden diese Methoden ausweiten und verfeinern."
 GER_aufklaerungseinheiten:0 "Aufklärungseinheiten"
 GER_aufklaerungseinheiten_desc:0 "Die Positionen und Bewegungen des Feindes zu kennen ist entscheidend. Wir investieren in spezielle Aufklärungseinheiten."
 GER_panzerwaffe:0 "Panzerwaffe"
 GER_panzerwaffe_desc:0 "Der Panzer hat die Kriegsführung für immer verändert. Deutschlands Ingenieure sollen die besten Panzerkampfwagen der Welt konstruieren."
 GER_artillerie_programm:0 "Artillerieprogramm"
 GER_artillerie_programm_desc:0 "Die deutsche Artillerie war der Schrecken unserer Feinde im Großen Krieg. Wir werden in neue Artilleriesysteme investieren."
 GER_blitzkrieg_doktrin:0 "Blitzkrieg-Doktrin"
 GER_blitzkrieg_doktrin_desc:0 "Kombinierte Kriegsführung — Panzer, Infanterie, Artillerie und Luftunterstützung in perfekter Koordination — wird das Heer Deutschlands unaufhaltsam machen."

 # MARINE
 GER_kaiserliche_marine:0 "Kaiserliche Marine"
 GER_kaiserliche_marine_desc:0 "Die Kaiserliche Deutsche Marine beherrscht die Wellen nach ihrem Triumph bei Skagerrak. Wir werden diese Streitmacht ausbauen und modernisieren."
 GER_hochseeflotte:0 "Hochseeflotte"
 GER_hochseeflotte_desc:0 "Die Hochseeflotte soll weiter ausgebaut werden. Deutschland wird Großbritannien um die marine Vorherrschaft herausfordern."
 GER_u_boot_krieg:0 "U-Boot-Krieg"
 GER_u_boot_krieg_desc:0 "Unsere U-Boote erwiesen sich im Großen Krieg als verheerend effektiv. Wir werden das U-Boot-Programm weiter vorantreiben."
 GER_weltmacht_zur_see:0 "Weltmacht zur See"
 GER_weltmacht_zur_see_desc:0 "Deutsche Seemacht soll sich über den gesamten Globus erstrecken. Die Fahne des Kaisers wird auf jedem Ozean wehen."
 GER_marinebasis_ausbau:0 "Marinebasis-Ausbau"
 GER_marinebasis_ausbau_desc:0 "Die großen Marinebasen in Kiel und Wilhelmshaven sollen ausgebaut werden, um unsere wachsende Flotte zu versorgen."

 # LUFTWAFFE
 GER_luftstreitkraefte:0 "Kaiserliche Luftstreitkräfte"
 GER_luftstreitkraefte_desc:0 "Von den kühnen Jagdfliegern des Großen Krieges zu einer modernen Luftwaffe — Deutschland soll die Lüfte beherrschen."
 GER_jagdflieger:0 "Jagdflieger"
 GER_jagdflieger_desc:0 "Die Tradition unserer großen Asse wie des Roten Barons soll fortleben. Wir bilden eine neue Generation von Jagdfliegern aus."
 GER_strategische_bomber:0 "Strategische Bomber"
 GER_strategische_bomber_desc:0 "Langstreckenbomber werden die deutsche Luftmacht weit jenseits unserer Grenzen projizieren."
 GER_luftueberlegenheit:0 "Luftüberlegenheit"
 GER_luftueberlegenheit_desc:0 "Deutschland soll den Himmel über jedem Schlachtfeld kontrollieren. Ohne Luftüberlegenheit kann keine Bodenoperation erfolgreich sein."
 GER_luftwaffe_ausbau:0 "Ausbau der Luftwaffe"
 GER_luftwaffe_ausbau_desc:0 "Neue Flugplätze und ausgeweitete Produktion sichern Deutschlands entscheidenden Vorteil in der Luft."

 # DIPLOMATIE & EXPANSION
 GER_weltpolitik:0 "Weltpolitik"
 GER_weltpolitik_desc:0 "Seit der Erklärung der Weltpolitik durch den Kaiser verfolgt Deutschland eine globale Rolle. Nun müssen wir festlegen, was das in dieser neuen Ära bedeutet."
 GER_mitteleuropa:0 "Mitteleuropa"
 GER_mitteleuropa_desc:0 "Mitteleuropa soll unter deutschem Führungsanspruch organisiert werden — eine gewaltige wirtschaftliche, politische und kulturelle Sphäre mit Berlin im Mittelpunkt."
 GER_lebensraum_im_osten:0 "Lebensraum im Osten"
 GER_lebensraum_im_osten_desc:0 "Die gewaltigen Gebiete Osteuropas, gewonnen durch den Vertrag von Brest-Litowsk, bieten Deutschland die Grundlage, die es braucht, um eine wahre Weltmacht zu werden."
 GER_brest_litovsk_nutzen:0 "Gewinne aus Brest-Litowsk nutzen"
 GER_brest_litovsk_nutzen_desc:0 "Der Vertrag von Brest-Litowsk hat Deutschland riesige Gebiete im Osten gegeben. Wir müssen diese Länder vollständig in die kaiserliche Sphäre integrieren."
 GER_kolonialreich:0 "Kolonialreich"
 GER_kolonialreich_desc:0 "Deutschlands überseeische Kolonien wurden durch unseren Sieg bewahrt. Jetzt müssen wir sie zu einem wahren globalen Imperium ausbauen."
 GER_mittelafrika:0 "Mittelafrika"
 GER_mittelafrika_desc:0 "Ein großes deutsches Kolonialterritorium, das ganz Zentralafrika umspannt — ein Mittelafrika — soll Deutschlands überseeisches Juwel werden."
 GER_buendnis_mit_oesterreich:0 "Bündnis mit Österreich"
 GER_buendnis_mit_oesterreich_desc:0 "Österreich-Ungarn ist unser ältester Verbündeter. Wir werden diese Partnerschaft zu einem dauerhaften und unzerbrechlichen Bündnis vertiefen."
 GER_schweiz_einladen:0 "Die Schweiz einladen"
 GER_schweiz_einladen_desc:0 "Die Schweiz, ein deutschsprachiges neutrales Land im Herzen Europas, wäre ein wertvoller Partner im Deutschen Pakt. Wir werden eine Einladung aussprechen, unserem wachsenden Bündnis beizutreten."
 GER_angebot_luxemburg:0 "Angebot an Luxemburg"
 GER_angebot_luxemburg_desc:0 "Das Großherzogtum Luxemburg, derzeit unter deutscher Verwaltung, verdient die Anerkennung als freie Nation. Wir werden seine Souveränität wiederherstellen — und es dennoch fest durch gegenseitigen Schutz und Mitgliedschaft im Deutschen Pakt an Deutschland binden."
 GER_anschluss_antreiben:0 "Den Anschluss vorantreiben"
 GER_anschluss_antreiben_desc:0 "Österreich und Deutschland sind ein Volk, eine Kultur, ein Schicksal. Wir werden die deutschsprachigen Länder unter der Krone des Kaisers wiedervereinigen."

 # Anschluss-Event-Lokalisation
 GER_anschluss.1.t:0 "Deutschland fordert die Vereinigung"
 GER_anschluss.1.d:0 "Kaiserliche Gesandte aus Berlin haben Deutschlands formelle Forderung nach Vereinigung überbracht. Das Kaiserreich verlangt von Österreich-Ungarn eine Antwort — unterwirft sich die Doppelmonarchie mit ihren österreichischen Ländern teilweise, ergibt sie sich vollständig oder verweigert sie und riskiert einen Feldzug unter deutschen Waffen?"
 GER_anschluss.1.a:0 "Teilweiser Anschluss: Die österreichischen Gebiete schließen sich Deutschland an, Ungarn bleibt frei"
 GER_anschluss.1.b:0 "Vollständiger Anschluss: Ganz Österreich-Ungarn wird deutsches Territorium"
 GER_anschluss.1.c:0 "Wien verweigert — wir werden nicht nachgeben!"

 GER_sudetenland_forderung:0 "Das Sudetenland fordern"
 GER_sudetenland_forderung_desc:0 "Millionen von Deutschen leben unter tschechischer Herrschaft im Sudetenland. Wir werden fordern, dass diese Gebiete dem Reich zurückgegeben werden."
 GER_plan_oranje:0 "Plan Oranje"
 GER_plan_oranje_desc:0 "Die Niederlande, eine kleine Nation an Deutschlands westlicher Flanke, besitzen riesige Kolonialgebiete und strategisch wichtige Häfen an der Rheinmündung. Der Kaiserliche Generalstab hat einen Notfallplan — Plan Oranje — für die schnelle Unterwerfung der Holländer ausgearbeitet. Mit ihrem Territorium unter kaiserlicher Kontrolle würde Deutschland die Nordseeküste sichern und die Zugänge zu Großbritannien beherrschen."

 # FORSCHUNG
 GER_wissenschaft_und_forschung:0 "Wissenschaft und Forschung"
 GER_wissenschaft_und_forschung_desc:0 "Die deutsche Wissenschaft hat die Welt seit Langem angeführt. Wir werden in unsere größten Universitäten und Forschungsinstitute investieren."
 GER_universitaeten_foerdern:0 "Universitäten fördern"
 GER_universitaeten_foerdern_desc:0 "Die großen Universitäten Berlins, Leipzigs und Heidelbergs sollen kaiserliche Förderung erhalten."
 GER_raketen_forschung:0 "Raketenforschung"
 GER_raketen_forschung_desc:0 "Deutsche Wissenschaftler in Peenemünde und anderswo sind Pioniere der Raketenwissenschaft. Wir werden diese Forschung großzügig finanzieren."
 GER_chemische_industrie:0 "Chemische Industrie"
 GER_chemische_industrie_desc:0 "Deutschlands chemische Industrie ist die fortschrittlichste der Welt. Wir werden sicherstellen, dass sie dem Reich dient."
 GER_atomforschung:0 "Atomforschung"
 GER_atomforschung_desc:0 "Die Spaltung des Atoms könnte den Schlüssel zu unbegrenzter Energie oder der fürchterlichsten Waffe bergen. Deutschland muss als erstes ihre Geheimnisse lüften."

 # IDEAS
 GER_wirtschaftswunder_idea:0 "Wirtschaftswunder"
 GER_wirtschaftswunder_idea_desc:0 "Die deutsche Wirtschaft boomt, angetrieben durch Sieg, Gebietsausweitung und eine solide kaiserliche Wirtschaftspolitik."
 GER_reichsbahn_idea:0 "Ausgebaute Reichsbahn"
 GER_reichsbahn_idea_desc:0 "Das ausgebaute kaiserliche Eisenbahnnetz verbessert die Geschwindigkeit von Truppen- und Nachschubbewegungen erheblich."
 GER_kriegswirtschaft_idea:0 "Kriegswirtschaft"
 GER_kriegswirtschaft_idea_desc:0 "Deutschland hat eine Wirtschaftspolitik eingeführt, die der Militärproduktion Priorität einräumt."
 GER_export_wirtschaft_idea:0 "Rüstungsexporteur"
 GER_export_wirtschaft_idea_desc:0 "Deutschlands Ruf als erstklassiger Rüstungsexporteur bringt wertvolle Devisen ein."
 GER_kaiserliche_verwaltung_idea:0 "Effiziente Kaiserliche Verwaltung"
 GER_kaiserliche_verwaltung_idea_desc:0 "Die reformierte kaiserliche Verwaltung hält das riesige Reich reibungslos am Laufen."
 GER_pangermanismus_idea:0 "Pangermanismus"
 GER_pangermanismus_idea_desc:0 "Die Ideologie des Pangermanismus entfacht nationalistische Begeisterung."
 GER_monarchistische_jugend_idea:0 "Monarchistische Jugend"
 GER_monarchistische_jugend_idea_desc:0 "Eine Generation im Geiste der Loyalität zu Kaiser und Vaterland liefert patriotische Rekruten."
 GER_volkssturm_idea:0 "Kaiserliche Heimwehr"
 GER_volkssturm_idea_desc:0 "Reserveeinheiten patriotischer Deutschen ergänzen unsere regulären Streitkräfte."
 GER_starkes_kaiserreich_idea:0 "Konsolidiertes Kaiserreich"
 GER_starkes_kaiserreich_idea_desc:0 "Die Festigung der kaiserlichen Macht hat Deutschland stabiler und besser positioniert gemacht."
 GER_wilhelminisches_militaer_idea:0 "Wilhelminische Militärtradition"
 GER_wilhelminisches_militaer_idea_desc:0 "Die stolze Tradition des kaiserlichen deutschen Militärs bringt Disziplin, Effizienz und Prestige."
 GER_weimarer_weg_idea:0 "Die Weimarer Republik"
 GER_weimarer_weg_idea_desc:0 "Deutschland vollzieht den Übergang zur Demokratie, obwohl politische Fragmentierung eine Herausforderung bleibt."
 GER_parlamentarismus_idea:0 "Parlamentarismus"
 GER_parlamentarismus_idea_desc:0 "Ein funktionierendes parlamentarisches System stärkt demokratische Legitimität und politisches Engagement."
 GER_rote_front_idea:0 "Rote Front"
 GER_rote_front_idea_desc:0 "Die kommunistische Bewegung gewinnt an Stärke, mit organisierten Parteimilizen und wachsender Volksunterstützung."
 GER_sowjet_buendnis_idea:0 "Deutsch-Sowjetische Bruderschaft"
 GER_sowjet_buendnis_idea_desc:0 "Das revolutionäre Band zwischen Deutschland und der Sowjetunion stärkt beide Nationen gegen die bürgerliche Welt."
 GER_nationale_bewegung_idea:0 "Nationale Bewegung"
 GER_nationale_bewegung_idea_desc:0 "Eine Welle radikalen Nationalismus erfasst Deutschland und füllt das Volk mit Eifer und dem Willen zur Dominanz."
 GER_sa_milizen_idea:0 "SA-Paramilitärs"
 GER_sa_milizen_idea_desc:0 "Die braunhemdigten Bataillone der SA setzen Ordnung auf den Straßen durch und bereiten eine Generation von Kämpfern vor."
 GER_propaganda_feldzug_idea:0 "Propagandaapparat"
 GER_propaganda_feldzug_idea_desc:0 "Die vollständige Kontrolle der Medien hält die Bevölkerung loyal, motiviert und opferbereit."
 GER_gleichschaltung_idea:0 "Gleichschaltung"
 GER_gleichschaltung_idea_desc:0 "Jede Institution wurde auf die Bewegung ausgerichtet. Deutschland handelt als Eine."
 GER_fuehrerstaat_idea:0 "Führerstaat"
 GER_fuehrerstaat_idea_desc:0 "Absolute Autorität in einem einzigen Führer gibt Deutschland entschlossene, kompromisslose Führung."
 GER_vierjahresplan_idea:0 "Vierjahresplan"
 GER_vierjahresplan_idea_desc:0 "Die Wirtschaft ist vollständig mobilisiert. Die Produktion schießt in die Höhe, da die Industrie dem Willen des Staates gebeugt wird."
 GER_achsenmaechte_idea:0 "Achsenmächte"
 GER_achsenmaechte_idea_desc:0 "Deutschland steht an der Spitze einer Koalition faschistischer Mächte, vereint in Ideologie und Ehrgeiz."
 GER_kaiserliches_heer_idea:0 "Modernisierung des Kaiserlichen Heeres"
 GER_kaiserliches_heer_idea_desc:0 "Das Kaiserliche Deutsche Heer modernisiert Ausrüstung, Ausbildung und Doktrin."
 GER_blitzkrieg_idea:0 "Blitzkrieg"
 GER_blitzkrieg_idea_desc:0 "Blitzkrieg — der koordinierte Schlag von Panzer, motorisierter Infanterie und Luftmacht — macht Deutschlands Bodentruppen einzigartig effektiv."
 GER_kaiserliche_marine_idea:0 "Stolz der Kaiserlichen Marine"
 GER_kaiserliche_marine_idea_desc:0 "Die siegreiche Kaiserliche Deutsche Marine erweckt Stolz und zieht erfahrene Matrosen und Ingenieure an."
 GER_weltmacht_zur_see_idea:0 "Weltmacht zur See"
