l_english:
 # Fallback keys used directly by GUI if scripted localisation does not resolve
 ES_MONEY_TOPBAR_VALUE:0 "[?ROOT.money|0]"
 ES_MONEY_TOPBAR_TOOLTIP:0 "Treasury\nCurrent funds: [?ROOT.money|0] Dollar\nMonthly growth: +[?ROOT.monthly_income|0] Dollar\nMonthly expenses: -[?ROOT.monthly_wages|0] Dollar\nMonthly construction costs: -[?ROOT.es_expense_build_total|0] Dollar\nNet monthly change: [?ROOT.monthly_net|+=0] Dollar\n\nIncome sources:\n Taxes: +[?ROOT.es_income_taxes|0]\n Civilian factories: +[?ROOT.es_income_civ_factories|0]\n\nExpense sources:\n Division wages: -[?ROOT.es_expense_divisions|0]\n Military factory upkeep: -[?ROOT.es_expense_military_factories|0]\n Dockyard upkeep: -[?ROOT.es_expense_dockyards|0]\n Building military factories: -[?ROOT.es_expense_build_military_factories|0]\n Building dockyards: -[?ROOT.es_expense_build_dockyards|0]"

 # ES Money topbar display - k/m notation like manpower
 ES_MONEY_TOPBAR_VALUE_M:0 "[?ROOT.money_m|1]M"
 ES_MONEY_TOPBAR_VALUE_K:0 "[?ROOT.money_k|1]k"
 ES_MONEY_TOPBAR_VALUE_RAW:0 "[?ROOT.money|0]"

 # Tooltip content (key returned by ES_MONEY_TOPBAR_TOOLTIP defined_text)
 ES_MONEY_TOPBAR_TOOLTIP_LOC:0 "Treasury\nCurrent funds: [?ROOT.money|0] Dollar\nMonthly growth: +[?ROOT.monthly_income|0] Dollar\nMonthly expenses: -[?ROOT.monthly_wages|0] Dollar\nMonthly construction costs: -[?ROOT.es_expense_build_total|0] Dollar\nNet monthly change: [?ROOT.monthly_net|+=0] Dollar\n\nIncome sources:\n Taxes: +[?ROOT.es_income_taxes|0]\n Civilian factories: +[?ROOT.es_income_civ_factories|0]\n\nExpense sources:\n Division wages: -[?ROOT.es_expense_divisions|0]\n Military factory upkeep: -[?ROOT.es_expense_military_factories|0]\n Dockyard upkeep: -[?ROOT.es_expense_dockyards|0]\n Building military factories: -[?ROOT.es_expense_build_military_factories|0]\n Building dockyards: -[?ROOT.es_expense_build_dockyards|0]\n\nTaxable civilians = owned core and non-core population minus fielded soldiers minus soldiers in training.\nIf direct state population cannot be read by script, the system falls back to current manpower plus troops already in service.\nBuilding costs are charged when construction is completed (monthly check)."
