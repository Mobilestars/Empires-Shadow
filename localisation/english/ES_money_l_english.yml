 # Tooltip content (key returned by ES_MONEY_TOPBAR_TOOLTIP defined_text)
 ES_MONEY_TOPBAR_TOOLTIP_LOC:0 "Treasury\nCurrent funds: [?es_money|0] Dollar\nMonthly growth: +[?es_monthly_income|0] Dollar\nMonthly expenses: -[?es_monthly_wages|0] Dollar\nNet monthly change: [?es_monthly_net|+=0] Dollar\n\nEligible population: [?es_total_pop|0]k\nFree manpower pool: [?es_free_manpower_k|0]k\nTaxable civilians: [?es_taxable_pop|0]k\n\nTaxable civilians = eligible core and non-core population minus free manpower pool minus fielded soldiers minus soldiers in training.\nDivision wages depend on template composition (armoured cost more).\nSoldiers in training and field are paid wages by the state."
