 GER_bhp_war_with_france:0 "War with France"
 GER_bhp_war_with_france_desc:0 "With preparations complete, France must be knocked out to secure Germany's western front."
 GER_sa_milizen:0 "SA Militias"
 GER_sa_milizen_desc:0 "The Sturmabteilung — the movement's paramilitary arm — shall be expanded and armed. These brown-shirted fighters will enforce the will of the movement on the streets."
 GER_propaganda_feldzug:0 "Propaganda Campaign"
 GER_propaganda_feldzug_desc:0 "The press, radio and public spectacle shall all be harnessed to spread the ideology of the movement and drown out dissenting voices."
 GER_gleichschaltung:0 "Gleichschaltung"
 GER_gleichschaltung_desc:0 "Every institution — the courts, the unions, the press, the universities — shall be brought into line with the movement's ideology. Germany speaks with one voice."
 GER_fuehrerstaat:0 "Führerstaat"
 GER_fuehrerstaat_desc:0 "The age of parliaments is over. Germany shall be governed by the absolute authority of a single leader — strong, decisive, and ruthless in pursuit of national greatness."
 GER_vierjahresplan:0 "Four Year Plan"
 GER_vierjahresplan_desc:0 "The economy shall be fully mobilized for the goals of the state. Rearmament, autarky and industrial expansion take absolute priority."
 GER_achsenmaechte:0 "Axis Powers"
 GER_achsenmaechte_desc:0 "Fascist Germany shall reach out to like-minded regimes across Europe. Together we will forge an axis of power that will redraw the map of the world."

 # MILITÄR (Military)
 GER_kaiserliches_heer:0 "Imperial Army"
 GER_kaiserliches_heer_desc:0 "The Imperial German Army emerged victorious from the Great War. Now we must modernize and strengthen it to meet the challenges of the coming era."
 GER_sturmbataillon:0 "Storm Battalions"
 GER_sturmbataillon_desc:0 "The Stoßtruppen — our elite stormtroopers — pioneered revolutionary assault tactics in the Great War. We shall expand and refine these methods."
 GER_aufklaerungseinheiten:0 "Reconnaissance Units"
 GER_aufklaerungseinheiten_desc:0 "Knowing the enemy's positions and movements is vital. We will invest in dedicated reconnaissance units, both mounted and motorized."
 GER_panzerwaffe:0 "Armored Force"
 GER_panzerwaffe_desc:0 "The tank changed warfare forever. Germany's engineers shall design the finest armored vehicles in the world."
 GER_artillerie_programm:0 "Artillery Programme"
 GER_artillerie_programm_desc:0 "German artillery was the terror of our enemies in the Great War. We shall invest in new artillery platforms and doctrines to support our advancing forces."
 GER_blitzkrieg_doktrin:0 "Blitzkrieg Doctrine"
 GER_blitzkrieg_doktrin_desc:0 "Combined arms warfare — tanks, infantry, artillery, and air support working in perfect coordination — will make Germany's army an unstoppable force."

 # MARINE (Navy)
 GER_kaiserliche_marine:0 "Imperial Navy"
 GER_kaiserliche_marine_desc:0 "The Imperial German Navy, our great Hochseeflotte, rules the waves after its triumph at Jutland. We shall invest in expanding and modernizing this force."
 GER_hochseeflotte:0 "High Seas Fleet"
 GER_hochseeflotte_desc:0 "The Hochseeflotte shall be further expanded. Germany will challenge Britannia for naval supremacy in European and Atlantic waters."
 GER_u_boot_krieg:0 "Submarine Warfare"
 GER_u_boot_krieg_desc:0 "Our submarines proved devastatingly effective in the Great War. We shall push our U-boat program further, building a great undersea fleet."
 GER_weltmacht_zur_see:0 "World Power at Sea"
 GER_weltmacht_zur_see_desc:0 "German naval power shall extend across the globe. The Kaiser's flag will fly on every ocean."
 GER_marinebasis_ausbau:0 "Naval Base Expansion"
 GER_marinebasis_ausbau_desc:0 "The great naval bases at Kiel and Wilhelmshaven shall be expanded to support our growing fleet."

 # LUFTWAFFE (Air Force)
 GER_luftstreitkraefte:0 "Imperial Air Force"
 GER_luftstreitkraefte_desc:0 "From the bold eagle knights of the Great War to a modern air force — Germany shall dominate the skies."
 GER_jagdflieger:0 "Fighter Pilots"
 GER_jagdflieger_desc:0 "The tradition of our great aces like the Red Baron shall live on. We will train a new generation of fighter pilots to defend German skies."
 GER_strategische_bomber:0 "Strategic Bombers"
 GER_strategische_bomber_desc:0 "Long-range bombers will project German air power far beyond our borders, striking at the industrial heartland of any enemy."
 GER_luftueberlegenheit:0 "Air Superiority"
 GER_luftueberlegenheit_desc:0 "Germany shall control the skies above any battlefield. Without air superiority, no ground campaign can succeed."
 GER_luftwaffe_ausbau:0 "Air Force Expansion"
 GER_luftwaffe_ausbau_desc:0 "New airfields and expanded production will ensure Germany maintains a decisive advantage in the air."

 # DIPLOMATIE & EXPANSION (Diplomacy)
 GER_weltpolitik:0 "World Policy"
 GER_weltpolitik_desc:0 "Since the Kaiser's declaration of Weltpolitik, Germany has pursued a global role. We must now define what that means in this new era."
 GER_mitteleuropa:0 "Mitteleuropa"
 GER_mitteleuropa_desc:0 "Central Europe shall be organized under German leadership — a vast economic, political, and cultural sphere centered on Berlin."
 GER_lebensraum_im_osten:0 "Lebensraum in the East"
 GER_lebensraum_im_osten_desc:0 "The vast territories of Eastern Europe, won or secured through the Treaty of Brest-Litovsk, offer Germany the agricultural and resource base it needs to become a true world power."
 GER_brest_litovsk_nutzen:0 "Leverage the Brest-Litovsk Gains"
 GER_brest_litovsk_nutzen_desc:0 "The Treaty of Brest-Litovsk granted Germany vast territories in the East. We must fully integrate these lands into the Imperial sphere."
 GER_kolonialreich:0 "Colonial Empire"
 GER_kolonialreich_desc:0 "Germany's overseas colonies were preserved through our victory. Now we must expand them into a true global empire."
 GER_mittelafrika:0 "Mittelafrika"
 GER_mittelafrika_desc:0 "A great German colonial territory spanning Central Africa — a Mittelafrika — shall become Germany's overseas jewel."
 GER_buendnis_mit_oesterreich:0 "Alliance with Austria"
 GER_buendnis_mit_oesterreich_desc:0 "Austria-Hungary is our oldest ally. We shall formalize this historic partnership into the Deutscher Pakt — a permanent military and political alliance, binding our nations in destiny and brotherhood."
 GER_schweiz_einladen:0 "Invite Switzerland"
 GER_schweiz_einladen_desc:0 "Switzerland, a German-speaking neutral nestled in the heart of Europe, would be a valuable partner in the Deutscher Pakt. We shall extend an invitation to join our growing alliance."
 GER_angebot_luxemburg:0 "Offer to Luxembourg"
 GER_angebot_luxemburg_desc:0 "The Grand Duchy of Luxembourg, currently under German administration, deserves recognition as a free nation. We shall restore its sovereignty — yet bind it firmly to Germany through mutual protection and membership in the Deutscher Pakt."
 GER_anschluss_antreiben:0 "Drive the Anschluss"
 GER_anschluss_antreiben_desc:0 "Austria and Germany are one people, one culture, one destiny. We shall confront Austria-Hungary with the question of unification. How they respond will determine whether this is achieved peacefully or by force."

 # Anschluss Event Localisation
 GER_anschluss.1.t:0 "Germany Demands Unification"
 GER_anschluss.1.d:0 "Imperial envoys from Berlin have delivered Germany's formal demand for unification. The Kaiserreich calls upon Austria-Hungary to answer — does the Dual Monarchy submit its Austrian lands, surrender entirely, or refuse and face German arms?"
 GER_anschluss.1.a:0 "Partial Anschluss: Austrian lands join Germany, Hungary remains free"
 GER_anschluss.1.b:0 "Complete Anschluss: All of Austria-Hungary becomes German territory"
 GER_anschluss.1.c:0 "Vienna refuses — we will not yield!"

 GER_sudetenland_forderung:0 "Claim the Sudetenland"
 GER_sudetenland_forderung_desc:0 "Millions of Germans live under Czech rule in the Sudetenland. We will demand that these lands — rightfully German — are returned to the Reich."
 GER_plan_oranje:0 "Plan Oranje"
 GER_plan_oranje_desc:0 "The Netherlands, a small nation nestled on Germany's western flank, controls vast colonial holdings and strategically vital ports at the mouth of the Rhine. The Imperial General Staff has prepared a contingency plan — Plan Oranje — for the swift subjugation of the Dutch. With their territory under Imperial control, Germany would secure the North Sea coast and dominate the approaches to Britain."

 # FORSCHUNG (Research)
 GER_wissenschaft_und_forschung:0 "Science and Research"
 GER_wissenschaft_und_forschung_desc:0 "German science has long led the world. We shall invest in our greatest universities and research institutes to maintain this edge."
 GER_universitaeten_foerdern:0 "Promote Universities"
 GER_universitaeten_foerdern_desc:0 "The great universities of Berlin, Leipzig, and Heidelberg shall receive Imperial patronage to attract the finest minds from across Germany and beyond."
 GER_raketen_forschung:0 "Rocket Research"
 GER_raketen_forschung_desc:0 "German scientists at Peenemünde and elsewhere are pioneering the science of rocketry. We shall fund this research generously."
 GER_chemische_industrie:0 "Chemical Industry"
 GER_chemische_industrie_desc:0 "Germany's chemical industry — led by firms like IG Farben — is the most advanced in the world. We shall ensure it serves the Reich."
 GER_atomforschung:0 "Atomic Research"
 GER_atomforschung_desc:0 "The splitting of the atom may hold the key to limitless energy — or the most terrible weapon ever conceived. Germany must be first to unlock its secrets."

 # IDEAS
 GER_wirtschaftswunder_idea:0 "Economic Miracle"
 GER_wirtschaftswunder_idea_desc:0 "The German economy is booming, fueled by victory, territorial expansion, and sound Imperial economic policy."
 GER_reichsbahn_idea:0 "Expanded Reichsbahn"
 GER_reichsbahn_idea_desc:0 "The expanded Imperial Railway network dramatically improves the speed at which troops and supplies can be moved."
 GER_kriegswirtschaft_idea:0 "War Economy"
 GER_kriegswirtschaft_idea_desc:0 "Germany has adopted an economic policy that prioritizes military production."
 GER_export_wirtschaft_idea:0 "Arms Exporter"
 GER_export_wirtschaft_idea_desc:0 "Germany's reputation as a top-tier arms exporter earns valuable foreign exchange."
 GER_kaiserliche_verwaltung_idea:0 "Efficient Imperial Administration"
 GER_kaiserliche_verwaltung_idea_desc:0 "The reformed Imperial administration keeps the vast Reich running smoothly."
 GER_pangermanismus_idea:0 "Pan-Germanism"
 GER_pangermanismus_idea_desc:0 "The ideology of Pan-Germanism stirs nationalist fervor, boosting both war support and recruitment."
 GER_monarchistische_jugend_idea:0 "Monarchist Youth"
 GER_monarchistische_jugend_idea_desc:0 "A generation raised on loyalty to Kaiser and Fatherland provides a steady stream of patriotic recruits."
 GER_volkssturm_idea:0 "Imperial Home Guard"
 GER_volkssturm_idea_desc:0 "Reserve units of patriotic Germans supplement our regular forces."
 GER_starkes_kaiserreich_idea:0 "Consolidated Kaiserreich"
 GER_starkes_kaiserreich_idea_desc:0 "The consolidation of Imperial power has made Germany more stable and better positioned to pursue its national goals."
 GER_wilhelminisches_militaer_idea:0 "Wilhelminian Military Tradition"
 GER_wilhelminisches_militaer_idea_desc:0 "The proud tradition of the Imperial German military brings discipline, efficiency, and prestige."
 GER_weimarer_weg_idea:0 "The Weimar Republic"
 GER_weimarer_weg_idea_desc:0 "Germany transitions toward democracy, though political fragmentation remains a challenge."
 GER_parlamentarismus_idea:0 "Parliamentarism"
 GER_parlamentarismus_idea_desc:0 "A functioning parliamentary system strengthens democratic legitimacy and political engagement."
 GER_rote_front_idea:0 "Red Front"
 GER_rote_front_idea_desc:0 "The Communist movement is gaining strength, with organized party militias and growing popular support."
 GER_sowjet_buendnis_idea:0 "Soviet-German Brotherhood"
 GER_sowjet_buendnis_idea_desc:0 "The revolutionary bond between Germany and the Soviet Union strengthens both nations against the bourgeois world."
 GER_nationale_bewegung_idea:0 "National Movement"
 GER_nationale_bewegung_idea_desc:0 "A wave of radical nationalism sweeps Germany, filling the people with fervor and the will to dominate."
 GER_sa_milizen_idea:0 "SA Paramilitaries"
 GER_sa_milizen_idea_desc:0 "The SA's brown-shirted battalions enforce order on the streets and prepare a generation of fighters."
 GER_propaganda_feldzug_idea:0 "Propaganda Apparatus"
 GER_propaganda_feldzug_idea_desc:0 "Total control of the media ensures the population is kept loyal, motivated and ready for sacrifice."
 GER_gleichschaltung_idea:0 "Gleichschaltung"
 GER_gleichschaltung_idea_desc:0 "Every institution has been brought into line with the movement. Germany acts as one."
 GER_fuehrerstaat_idea:0 "Führerstaat"
 GER_fuehrerstaat_idea_desc:0 "Absolute authority concentrated in a single leader gives Germany decisive, uncompromising direction."
 GER_vierjahresplan_idea:0 "Four Year Plan"
 GER_vierjahresplan_idea_desc:0 "The economy is fully mobilized. Production is skyrocketing as industry is bent entirely to the will of the state."
 GER_achsenmaechte_idea:0 "Axis Powers"
 GER_achsenmaechte_idea_desc:0 "Germany stands at the head of a coalition of fascist powers, united in ideology and ambition."
 GER_kaiserliches_heer_idea:0 "Imperial Army Modernization"
 GER_kaiserliches_heer_idea_desc:0 "The Imperial German Army is in the process of modernizing its equipment, training, and doctrine."
 GER_blitzkrieg_idea:0 "Blitzkrieg"
 GER_blitzkrieg_idea_desc:0 "Lightning war — the coordinated strike of armor, motorized infantry, and air power — makes Germany's ground forces uniquely effective."
 GER_kaiserliche_marine_idea:0 "Imperial Navy Pride"
 GER_kaiserliche_marine_idea_desc:0 "The victorious Imperial German Navy inspires pride and attracts skilled sailors and engineers."
 GER_weltmacht_zur_see_idea:0 "World Power at Sea"
 GER_weltmacht_zur_see_idea_desc:0 "Germany's growing naval power projects the Kaiser's will across the world's oceans."
 GER_luftstreitkraefte_idea:0 "Imperial Air Force"
 GER_luftstreitkraefte_idea_desc:0 "Germany's air force, heir to the tradition of the Great War's legendary aces, is an elite fighting force."
 GER_luftueberlegenheit_idea:0 "Air Superiority Doctrine"
 GER_luftueberlegenheit_idea_desc:0 "German air doctrine emphasizes seizing and maintaining air superiority above all else."
 GER_weltpolitik_idea:0 "Weltpolitik"
 GER_weltpolitik_idea_desc:0 "Germany pursues an active world policy, seeking influence and advantage in every corner of the globe."
 GER_mitteleuropa_idea:0 "Mitteleuropa"
 GER_mitteleuropa_idea_desc:0 "Germany's vision of a Central European order under its leadership attracts satellite states and smaller nations."
 GER_lebensraum_idea:0 "Lebensraum"
 GER_lebensraum_idea_desc:0 "The Imperial drive for living space in the East fills soldiers and settlers with purpose."
 GER_kolonialreich_idea:0 "Colonial Empire"
 GER_kolonialreich_idea_desc:0 "Germany's restored and expanded colonial empire brings prestige and resources."
 GER_mittelafrika_idea:0 "Mittelafrika"
 GER_mittelafrika_idea_desc:0 "The dream of a grand German colonial territory in Central Africa inspires nationalist ambition."
 GER_chemische_industrie_idea:0 "German Chemical Industry"
 GER_chemische_industrie_idea_desc:0 "Germany's world-leading chemical sector provides crucial inputs for the arms industry and agriculture."
