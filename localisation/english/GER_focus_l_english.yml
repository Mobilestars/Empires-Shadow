 l_english:
 # WIRTSCHAFT (Economy)
 GER_wirtschaftswunder:0 "Economic Miracle"
 GER_wirtschaftswunder_desc:0 "Since our victory in the Great War, the German economy has flourished. Let us harness this momentum and press for even greater prosperity for the Fatherland."
 GER_kaiserliche_industrie:0 "Imperial Industry"
 GER_kaiserliche_industrie_desc:0 "The Kaiser's great factories are the backbone of our empire. We shall expand them to secure our industrial supremacy."
 GER_stahl_und_kohle:0 "Steel and Coal"
 GER_stahl_und_kohle_desc:0 "The Rhineland's rich deposits of steel and coal power the Empire. We will invest heavily in extracting these vital resources."
 GER_grosse_infrastruktur:0 "Grand Infrastructure"
 GER_grosse_infrastruktur_desc:0 "A mighty empire needs mighty roads and railways. We shall construct a network of infrastructure second to none in all of Europe."
 GER_reichsbahn_ausbau:0 "Reichsbahn Expansion"
 GER_reichsbahn_ausbau_desc:0 "The Imperial Railway is the lifeblood of our economy and military. Expanding its capacity will increase the speed of both commerce and troop movements."
 GER_wirtschaftspolitik:0 "Economic Policy"
 GER_wirtschaftspolitik_desc:0 "The Reich's ministers have long debated the best course for our economic future. The time has come to set a clear policy for the coming decades."
 GER_synthol_forschung:0 "Synthetic Oil Research"
 GER_synthol_forschung_desc:0 "Germany lacks natural oil. Our scientists must develop efficient methods of producing synthetic fuel to fuel our war machine and industry alike."
 GER_ru_stungsexporte:0 "Arms Exports"
 GER_ru_stungsexporte_desc:0 "German engineering is world-renowned. By exporting our superior weapons to allied and neutral nations, we can generate valuable foreign exchange and spread our influence."

 # INNENPOLITIK - GENERAL (all governments)
 GER_innenpolitik:0 "Domestic Policy"
 GER_innenpolitik_desc:0 "The internal order of the Reich must be addressed. Whether we govern as Kaisers, democrats, socialists or nationalists, the political direction of Germany must be set."
 GER_partei_verstaerkung:0 "Strengthen the Party"
 GER_partei_verstaerkung_desc:0 "Political power in Germany does not arise on its own. We must decide which political force we wish to promote and invest our resources accordingly."

 # PARTY STRENGTHENING (mutual exclusive, visible to all)
 GER_kaiserreich_staerken:0 "Strengthen the Kaiserreich"
 GER_kaiserreich_staerken_desc:0 "We shall invest in shoring up support for the Imperial cause — rallying the Junkers, the military establishment and the conservative masses behind the Kaiser's banner."
 GER_demokraten_staerken:0 "Strengthen the Democrats"
 GER_demokraten_staerken_desc:0 "The democratic movement draws support from liberals, moderate socialists and progressive voters. We shall give it the resources and platform it needs."
 GER_kommunisten_staerken:0 "Strengthen the Communists"
 GER_kommunisten_staerken_desc:0 "The revolutionary left is gaining ground. The Communist Party of Germany shall receive our backing to challenge the capitalist order."
 GER_faschisten_staerken:0 "Strengthen the Fascists"
 GER_faschisten_staerken_desc:0 "A new radical nationalist movement is rising. We shall channel the anger of veterans, nationalists and those who feel left behind into a powerful political force."

 # KAISERREICH PATH (visible only when Kaiserreich in power)
 GER_kaiser_unterstuetzung:0 "Imperial Support"
 GER_kaiser_unterstuetzung_desc:0 "Kaiser Wilhelm stands as the symbol of German power. We shall strengthen his position and rally the people around his throne."
 GER_reichsverfassung:0 "Imperial Constitution"
 GER_reichsverfassung_desc:0 "The Reich's constitution dating from 1871 has served us well. We shall reaffirm and consolidate the constitutional structures that bind our great empire together."
 GER_kaiserliche_verwaltung:0 "Imperial Administration"
 GER_kaiserliche_verwaltung_desc:0 "A well-oiled bureaucratic machine is essential to governing our vast empire. We must reform and strengthen the Imperial administration."
 GER_pangermanismus:0 "Pan-Germanism"
 GER_pangermanismus_desc:0 "The idea of a greater German nation, uniting all German-speaking peoples under the Kaiser's banner, stirs the hearts of patriots across Europe."
 GER_propaganda_des_kaisers:0 "Imperial Propaganda"
 GER_propaganda_des_kaisers_desc:0 "Control the press, shape the minds. The Imperial propaganda apparatus will cement the people's loyalty and prepare them for the sacrifices ahead."
 GER_monarchistische_jugend:0 "Monarchist Youth"
 GER_monarchistische_jugend_desc:0 "We shall invest in the education and training of Germany's youth, instilling in them loyalty to Kaiser and Fatherland from an early age."
 GER_volkssturm_des_kaiserreichs:0 "Imperial Home Guard"
 GER_volkssturm_des_kaiserreichs_desc:0 "Every able-bodied German man owes the Kaiser his service. We shall organize reserve units to bolster our military strength."
 GER_kaiserreich_festigen:0 "Consolidate the Kaiserreich"
 GER_kaiserreich_festigen_desc:0 "The German Empire shall be made permanent and unshakeable. Its institutions will be reformed and strengthened to endure for generations."
 GER_wilhelminisches_militaer:0 "Wilhelminian Military Tradition"
 GER_wilhelminisches_militaer_desc:0 "The traditions of the Imperial German military, forged through the wars of unification and hardened on the battlefields of the Great War, shall be preserved and celebrated."
 GER_bund_der_kaiser:0 "League of Kaisers"
 GER_bund_der_kaiser_desc:0 "Germany shall forge alliances with other great monarchies and authoritarian powers, creating a 'League of Kaisers' to stand against the democratic and communist worlds."

 # DEMOCRATIC PATH (visible only when democratic)
 GER_verfassungskonvent:0 "Constitutional Convention"
 GER_verfassungskonvent_desc:0 "A grand Constitutional Convention shall be called, with representatives from all walks of German life, to draft a new constitution for the Empire."
 GER_weimarer_weg:0 "The Weimar Path"
 GER_weimarer_weg_desc:0 "The monarchy is swept aside in favor of a democratic republic. Germany enters a new age — but stability must be found before freedom can flourish."
 GER_parlamentarismus:0 "Parliamentarism"
 GER_parlamentarismus_desc:0 "True democracy requires a parliament with real legislative power. We shall entrench the rights of elected representatives and build a stable multi-party system."

 # COMMUNIST PATH (visible only when communist)
 GER_rote_front:0 "Red Front"
 GER_rote_front_desc:0 "The Communist Party of Germany rises, organized and militant. The Red Front stands ready to challenge the bourgeois order."
 GER_raetemacht:0 "Council Republic"
 GER_raetemacht_desc:0 "Power to the workers! Germany shall become a council republic, governed by the people and for the people."
 GER_sowjet_buendnis:0 "Alliance with the Soviets"
 GER_sowjet_buendnis_desc:0 "The proletarian revolutions of Germany and Russia shall join hands. A German-Soviet alliance will shake the foundations of the capitalist world."

 # FASCIST PATH
 GER_beer_hall_putsch:0 "Beer Hall Putsch"
 GER_beer_hall_putsch_desc:0 "The National Socialists attempt to shatter the old order through a decisive seizure of power. If their movement is strong enough, the putsch can place the Reich in their hands and elevate Hitler to the head of state."
 GER_adopt_new_panzer_doctrine:0 "Adopt New Panzer Doctrine"
 GER_adopt_new_panzer_doctrine_desc:0 "The army must embrace modern armored warfare and operational mobility if Germany is to dominate continental battlefields."
 GER_dive_bombers:0 "Dive Bombers"
 GER_dive_bombers_desc:0 "Precision support aviation will spearhead our offensives and crush enemy strongpoints from above."
 GER_u_boat_efforts:0 "U-Boat Efforts"
 GER_u_boat_efforts_desc:0 "The Reichsmarine will focus on raiding enemy trade routes and strangling hostile supply lines."
 GER_the_four_year_plan:0 "The Four-Year Plan"
 GER_the_four_year_plan_desc:0 "A centrally directed industrial buildup will prepare Germany's economy for prolonged great-power war."
 GER_fuhrerprinzip:0 "Führerprinzip"
 GER_fuhrerprinzip_desc:0 "Power is to be concentrated in the leadership of the movement, unifying state and party under one authority."
 GER_army_indoctrination:0 "Army Indoctrination"
 GER_army_indoctrination_desc:0 "The armed forces must be politically aligned and psychologically prepared for total war."
 GER_reorganize_the_wehrmacht:0 "Reorganize the Wehrmacht"
 GER_reorganize_the_wehrmacht_desc:0 "A major command overhaul will align military leadership with the strategic goals of the new regime."
 GER_anti_comintern_pact:0 "Anti-Comintern Pact"
 GER_anti_comintern_pact_desc:0 "Germany will build an international front against Bolshevism and isolate Soviet influence."
 GER_combined_arms:0 "Combined Arms"
 GER_combined_arms_desc:0 "Close coordination between armor and air power will become the foundation of our operational doctrine."
 GER_anschluss:0 "Anschluss"
 GER_anschluss_desc:0 "Austria must be integrated into the Reich, whether by pressure, diplomacy, or force."
 GER_uplift_the_rosenberg_office:0 "Uplift the Rosenberg Office"
 GER_uplift_the_rosenberg_office_desc:0 "A stronger ideological administration will support governance over occupied and annexed territories."
 GER_molotov_ribbentrop_pact:0 "Molotov-Ribbentrop Pact"
 GER_molotov_ribbentrop_pact_desc:0 "A temporary accommodation with the Soviet Union may secure our eastern flank for the coming campaigns."
 GER_war_with_the_ussr:0 "War with the USSR"
 GER_war_with_the_ussr_desc:0 "The struggle against Bolshevism must be settled by force of arms across the eastern plains."
 GER_befriend_japan:0 "Befriend Japan"
 GER_befriend_japan_desc:0 "Closer ties with Japan can strengthen our anti-Soviet and anti-Allied strategic position."
 GER_demand_sudetenland:0 "Demand Sudetenland"
 GER_demand_sudetenland_desc:0 "German populations in the Sudetenland must be brought under Reich protection."
 GER_fate_of_czechoslovakia:0 "Fate of Czechoslovakia"
 GER_fate_of_czechoslovakia_desc:0 "Once Sudetenland is secured, the rest of Czechoslovakia must be politically or militarily resolved."
 GER_form_rome_berlin_axis:0 "Form the Rome-Berlin Axis"
 GER_form_rome_berlin_axis_desc:0 "An ideological and military understanding with Italy will anchor fascist power in Europe."
 GER_danzig_or_war:0 "War with Poland"
 GER_danzig_or_war_desc:0 "Poland stands in the way of German strategic ambitions in the east and must be confronted."
 GER_around_maginot:0 "Around Maginot"
 GER_around_maginot_desc:0 "Bypassing the Maginot Line through the Low Countries offers the best route to defeat France swiftly."
 GER_operation_weserubung:0 "Operation Weserubung"
 GER_operation_weserubung_desc:0 "Control of Denmark and Norway is essential to secure northern sea lanes and strategic resources."
 GER_war_with_france:0 "War with France"
 GER_war_with_france_desc:0 "With preparations complete, France must be knocked out to secure Germany's western front."
 GER_bhp_adopt_new_panzer_doctrine:0 "Adopt New Panzer Doctrine"
 GER_bhp_adopt_new_panzer_doctrine_desc:0 "The army must embrace modern armored warfare and operational mobility if Germany is to dominate continental battlefields."
