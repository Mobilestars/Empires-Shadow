 l_english:
 # WIRTSCHAFT (Economy)
 SWI_bankenplatz:0 "Banking Hub Switzerland"
 SWI_bankenplatz_desc:0 "Switzerland has emerged as one of Europe's most important financial centers. Our neutral banks enjoy the trust of all nations — friend and foe alike. Let us harness this unique position to further strengthen our economy."
 SWI_nationalbank:0 "Swiss National Bank"
 SWI_nationalbank_desc:0 "The Swiss National Bank safeguards our currency reserves and stabilizes the Swiss franc. With a stronger central bank, we can better steer the national economy and maintain the confidence of our trading partners."
 SWI_uhrenindustrie:0 "Watchmaking Industry"
 SWI_uhrenindustrie_desc:0 "Swiss watchmaking is world-famous for its precision and quality. From Geneva to the Jura mountains, our timepieces are coveted in every capital city on earth. We shall invest in and modernize this proud industry."
 SWI_devisenreserven:0 "Foreign Currency Reserves"
 SWI_devisenreserven_desc:0 "As a neutral nation with a stable currency, Europe's foreign exchange flows into our banks. These reserves provide us with economic independence and influence beyond our small borders."
 SWI_praezisionstechnik:0 "Precision Engineering"
 SWI_praezisionstechnik_desc:0 "The tradition of watchmaking has produced generations of Swiss engineers and craftsmen of the highest caliber. With investment in research and development, this expertise can be expanded to new industrial sectors."
 SWI_exportwirtschaft:0 "Export Economy"
 SWI_exportwirtschaft_desc:0 "Switzerland lacks the natural resources of a great power, but what we export stands for quality and reliability. Machinery, watches, chemicals and precision instruments — the world needs what we produce."

 # NEUTRALITÄT / AUSSENPOLITIK (Neutrality / Foreign Policy)
 SWI_ewige_neutralitaet:0 "Eternal Neutrality"
 SWI_ewige_neutralitaet_desc:0 "Since the Congress of Vienna in 1815, Switzerland's neutrality has been internationally recognized. In a world full of great powers and alliances, our neutrality is not a sign of weakness but a strategic strength to be preserved at any cost."
 SWI_rotes_kreuz:0 "The Red Cross"
 SWI_rotes_kreuz_desc:0 "It was a Swiss citizen, Henri Dunant, who — after the catastrophe of Solferino — founded the International Committee of the Red Cross. This Genevan institution is today the moral conscience of the world. We shall strengthen it and make it a beacon of peace."
 SWI_vlkerbund:0 "Seat of the League of Nations"
 SWI_vlkerbund_desc:0 "The League of Nations is headquartered in Geneva — a testament to the world's trust in Switzerland as a neutral host. We shall deepen this role and make Geneva the center of international diplomacy."
 SWI_humanitaere_hilfe:0 "Humanitarian Aid"
 SWI_humanitaere_hilfe_desc:0 "As a neutral nation, we can assist where great powers fail. Our doctors, diplomats and aid organizations work across the globe — reinforcing our reputation as an honest broker."
 SWI_genf_als_zentrum:0 "Geneva as Diplomatic Center"
 SWI_genf_als_zentrum_desc:0 "Geneva already hosts the League of Nations and the Red Cross. We shall invite further international organizations and embassies to transform our city into the diplomatic capital of the world."
 SWI_internationalismus:0 "Swiss Internationalism"
 SWI_internationalismus_desc:0 "Switzerland stands for international cooperation, humanitarian law and peaceful conflict resolution. These values are not only morally right — they also protect our independence from the great powers surrounding us."

 # INNENPOLITIK (Domestic Policy)
 SWI_bundesrat:0 "Federal Council"
 SWI_bundesrat_desc:0 "The Swiss Federal Council governs by the collegiate principle — no chancellor, no emperor, just seven equal federal councillors. This system brings stability and compromise, but in today's turbulent world we must strengthen our institutions."
 SWI_direktdemokratie:0 "Direct Democracy"
 SWI_direktdemokratie_desc:0 "Switzerland is proud of its direct democracy — a system that gives citizens not only the right to vote, but also the right to vote directly on laws and constitutional amendments. This tradition is fundamental to our national identity."
 SWI_kantonale_autonomie:0 "Cantonal Autonomy"
 SWI_kantonale_autonomie_desc:0 "Switzerland is not a centralized state but a confederation of 26 sovereign cantons, each with its own history, language and tradition. This diversity is our strength — we shall reinforce cantonal self-governance."
 SWI_volksrechte:0 "Strengthen People's Rights"
 SWI_volksrechte_desc:0 "Referendum and Initiative are the most powerful tools of the Swiss citizen. We shall expand these rights and deepen public trust in our institutions."
 SWI_partei_staerken:0 "Political Direction"
 SWI_partei_staerken_desc:0 "The world around us is changing rapidly. New political currents are gaining ground. Switzerland must decide which direction it will take — democratic, authoritarian, or revolutionary."

 # Party Paths
 SWI_demokratie_staerken:0 "Strengthen Democracy"
 SWI_demokratie_staerken_desc:0 "Radicals, Conservatives and Social Democrats — despite their differences, they share the conviction that democracy is the best system for our nation. We shall unite Switzerland's democratic forces."
 SWI_faschismus_staerken:0 "Support the Front Movement"
 SWI_faschismus_staerken_desc:0 "The National Fronts and similar movements are gaining followers even in Switzerland. They call for national renewal, strength and a break from parliamentary compromise. Whether this is the right path remains to be seen."
 SWI_kommunismus_staerken:0 "Strengthen the Labour Movement"
 SWI_kommunismus_staerken_desc:0 "The General Strike of 1918 proved that the Swiss working class can organize. Communist ideas from the East are finding followers here too. The time for revolution may be at hand."

 # Democratic Path
 SWI_freie_presse:0 "Free Press"
 SWI_freie_presse_desc:0 "In a democracy, a free press is indispensable. Switzerland's newspapers inform citizens and hold power to account. We shall protect and promote press freedom."
 SWI_sozialreformen:0 "Social Reforms"
 SWI_sozialreformen_desc:0 "The welfare state is the best answer to both communism and fascism. We shall invest in education, healthcare and social insurance so that no Swiss citizen is left behind."
 SWI_bundesstaat_konsolidieren:0 "Consolidate the Federal State"
 SWI_bundesstaat_konsolidieren_desc:0 "A strong democratic federal state is the foundation of our security. We shall reinforce the institutions of the Confederation and prepare them for the challenges ahead."

 # Fascist Path
 SWI_nationale_erneuerung:0 "National Renewal"
 SWI_nationale_erneuerung_desc:0 "The Frontists preach national renewal and a return to old virtues. Switzerland, once the land of the Confederates and brave warriors, shall rediscover its strength."
 SWI_frontenfruhling:0 "Spring of the Fronts"
 SWI_frontenfruhling_desc:0 "The National Fronts have seized power. A new Swiss awakening begins. Parliamentarism gives way to the strong, unified will of the nation."
 SWI_anschluss_an_deutschland:0 "Union with the Reich"
 SWI_anschluss_an_deutschland_desc:0 "Is Switzerland not at heart a German country? The German-speaking majority looks with admiration at the powerful Kaiserreich. Perhaps the time has come to bridge the division and join the German Reich."

 # Communist Path
 SWI_arbeiterbewegung:0 "Labour Movement"
 SWI_arbeiterbewegung_desc:0 "Switzerland's workers raise their voices. Trade unions and communist party organizations mobilize factory workers, mountain farmers and the urban poor."
 SWI_rote_schweiz:0 "Red Switzerland"
 SWI_rote_schweiz_desc:0 "The Swiss Soviet Republic is proclaimed! The direct democratic tradition of Switzerland takes on a new revolutionary meaning. Built together, seized from the capitalists."

 # MILITÄR (Military)
 SWI_bewaffnete_neutralitaet:0 "Armed Neutrality"
 SWI_bewaffnete_neutralitaet_desc:0 "The Swiss principle: we attack no one, but we defend ourselves with full force. Our militia army is not a tool of aggression but a shield. We shall make our defence the strongest in the Alps."
 SWI_milizreform:0 "Militia Reform"
 SWI_milizreform_desc:0 "The Swiss militia army rests on the principle that every citizen is a soldier. We shall improve training, modernize equipment and expand the reserves — ready to repel any attack."
 SWI_alpenbefestigungen:0 "Alpine Fortifications"
 SWI_alpenbefestigungen_desc:0 "The Alps are the world's most natural fortress. But nature alone is not enough. We shall construct bunkers, obstacles and artillery positions that will stop any invader in their tracks."
 SWI_alpenjager:0 "Alpenjäger"
 SWI_alpenjager_desc:0 "A Swiss Alpenjäger knows the mountain terrain like the back of his hand. Our mountain troops shall be trained as some of the most effective soldiers in Europe — fighting on ground that no attacker knows as well as we do."
 SWI_reduit:0 "National Réduit"
 SWI_reduit_desc:0 "The National Réduit is our last stronghold: a system of fortresses, tunnels and arms depots carved deep into the Alps. No enemy that captures the Swiss lowlands can take the Réduit."
 SWI_festung_schweiz:0 "Fortress Switzerland"
 SWI_festung_schweiz_desc:0 "Switzerland has become the most impregnable fortress in Europe. Alpenjäger, the Réduit and fortifications form an invincible triumvirate. Whoever attacks Switzerland attacks stone itself."

 # IDEAS
 SWI_nationalbank_idea:0 "Swiss National Bank"
 SWI_nationalbank_idea_desc:0 "The stable Swiss franc and the sound monetary policy of the National Bank ensure economic stability and foster investment."
 SWI_devisenreserven_idea:0 "Foreign Currency Reserves"
 SWI_devisenreserven_idea_desc:0 "Extensive currency reserves allow favourable trade conditions and secure access to raw materials from abroad."
 SWI_exportwirtschaft_idea:0 "Export-Oriented Economy"
 SWI_exportwirtschaft_idea_desc:0 "Swiss quality products are in global demand and bring valuable foreign currency into the country."
 SWI_neutralitaet_idea:0 "Armed Neutrality"
 SWI_neutralitaet_idea_desc:0 "Switzerland renounces all war aims and will join no faction. This neutrality comes at the cost of diplomatic and military flexibility."
 SWI_rotes_kreuz_idea:0 "Home of the Red Cross"
 SWI_rotes_kreuz_idea_desc:0 "As host of the ICRC, Switzerland enjoys moral authority and international recognition, bolstering internal stability."
 SWI_humanitaere_hilfe_idea:0 "Humanitarian Tradition"
 SWI_humanitaere_hilfe_idea_desc:0 "Switzerland is known as an honest broker and helper, facilitating diplomatic relations worldwide."
 SWI_genf_zentrum_idea:0 "Diplomatic Center Geneva"
 SWI_genf_zentrum_idea_desc:0 "Geneva is the heart of international diplomacy. This status brings political influence and diplomatic opportunities far beyond our borders."
 SWI_internationalismus_idea:0 "Swiss Internationalism"
 SWI_internationalismus_idea_desc:0 "Our commitment to international organizations strengthens stability and trade networks."
 SWI_direktdemokratie_idea:0 "Direct Democracy"
 SWI_direktdemokratie_idea_desc:0 "Referendum and initiative anchor political power with the people and deliver high political stability."
 SWI_kantone_idea:0 "Cantonal Self-Governance"
 SWI_kantone_idea_desc:0 "The autonomy of the cantons strengthens local administration and deepens citizens' loyalty to the federal state."
 SWI_volksrechte_idea:0 "Strengthened People's Rights"
 SWI_volksrechte_idea_desc:0 "An empowered citizenry contributes more strongly to national defence and economic development."
 SWI_freie_presse_idea:0 "Free Press"
 SWI_freie_presse_idea_desc:0 "A free and vibrant press landscape strengthens the democratic consciousness of the citizens."
 SWI_sozialreformen_idea:0 "Social Reforms"
 SWI_sozialreformen_idea_desc:0 "Investment in education and social security improves quality of life and strengthens societal cohesion."
 SWI_nationale_erneuerung_idea:0 "National Renewal"
 SWI_nationale_erneuerung_idea_desc:0 "Nationalist rhetoric and mobilization boost the population's readiness for war."
 SWI_frontenfruhling_idea:0 "Spring of the Fronts"
 SWI_frontenfruhling_idea_desc:0 "The National Fronts keep Switzerland in a state of national-revolutionary energy."
 SWI_arbeiterbewegung_idea:0 "Organized Labour Movement"
 SWI_arbeiterbewegung_idea_desc:0 "A well-organized workforce increases productivity and the political clout of the left."
 SWI_rote_schweiz_idea:0 "Red Switzerland"
 SWI_rote_schweiz_idea_desc:0 "Revolutionary enthusiasm drives production and defence forward."
 SWI_bewaffnete_neutralitaet_idea:0 "Armed Neutrality"
 SWI_bewaffnete_neutralitaet_idea_desc:0 "Every Swiss citizen knows: we defend our homeland, whatever the cost."
 SWI_milizreform_idea:0 "Militia Reform"
 SWI_milizreform_idea_desc:0 "A reformed militia army means shorter training times and more combat-ready troops."
 SWI_alpenjager_idea:0 "Alpenjäger Corps"
 SWI_alpenjager_idea_desc:0 "Swiss mountain troops are unmatched in alpine terrain — their local knowledge makes them feared defenders."
 SWI_reduit_idea:0 "National Réduit"
 SWI_reduit_idea_desc:0 "The Réduit concept turns every meter of Swiss soil into a defensive position."
 SWI_festung_schweiz_idea:0 "Fortress Switzerland"
 SWI_festung_schweiz_idea_desc:0 "Switzerland has become an impregnable bulwark. Defence is our supreme strength."
